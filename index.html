<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My App</title>

<link rel="icon" href="icon.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  text-align:center;
}

.container {
  max-width:420px;
  margin:auto;
  padding:20px;
}

.logo {
  width:90px;
  border-radius:20px;
  margin:20px 0;
}

button {
  padding:14px;
  border:none;
  border-radius:12px;
  background:#6366f1;
  color:white;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}

button:disabled {
  opacity:0.6;
}

/* 🔥 CAROUSEL */
.carousel-wrapper {
  position: relative;
  margin-top: 20px;
}

.carousel {
  overflow: hidden;
}

.carousel-track {
  display: flex;
  gap: 12px;
  transition: transform 0.5s ease;
}

.carousel img {
  width: 70%;
  max-width: 180px;
  border-radius: 14px;
  flex-shrink: 0;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  font-size: 20px;
  padding: 8px 12px;
  border-radius: 50%;
  cursor: pointer;
}

.left { left: -10px; }
.right { right: -10px; }

.counter {
  margin-top:15px;
  font-size:13px;
  color:#94a3b8;
}

#msg {
  margin-top:10px;
  font-size:13px;
}
</style>

</head>

<body>
<div class="container">

<img src="icon.png" class="logo">

<h2>My App</h2>

<button onclick="handleDownload()" id="btn" disabled>Loading...</button>

<div id="msg"></div>

<!-- 🔥 CAROUSEL -->

<div class="carousel-wrapper">
  <button class="arrow left" onclick="prevSlide()">❮</button>
  <div class="carousel">
    <div class="carousel-track" id="track"></div>
  </div>
  <button class="arrow right" onclick="nextSlide()">❯</button>
</div>

<div class="counter" id="counter">Downloads: ...</div>

</div>

<script>
// 🔥 CONFIG
const repo = "Merrickal/ToolsManual";
const APP_SCHEME = "myapp://";
let apkUrl = "";

// FETCH APK
async function fetchAPK(){
  try {
    const res = await fetch(`https://api.github.com/repos/${repo}/releases/latest`);
    if(!res.ok) throw new Error();

    const data = await res.json();
    const apk = data.assets.find(a=>a.name.endsWith(".apk"));

    if(!apk) throw new Error();

    apkUrl = apk.browser_download_url;

    const btn = document.getElementById("btn");
    btn.innerText = "Download APK";
    btn.disabled = false;

  } catch {
    document.getElementById("btn").innerText = "APK not available";
  }
}
fetchAPK();

// DEVICE DETECT
const ua = navigator.userAgent.toLowerCase();
const msg = document.getElementById("msg");

if(/android/.test(ua)){
  msg.innerText="Android device detected";
}else if(/iphone|ipad/.test(ua)){
  msg.innerText="Not available on iOS";
}else{
  msg.innerText="Use your phone to install the app";
}

// 🔥 OPEN APP OR DOWNLOAD
function handleDownload(){
  window.location = APP_SCHEME;

  setTimeout(()=>{
    if(apkUrl){
      window.location = apkUrl;
      incrementDownload();
    }
  },1500);
}

// 🔥 CAROUSEL
const track = document.getElementById("track");
let index = 0;
let total = 5;

for(let i=1;i<=total;i++){
  let img=document.createElement("img");
  img.src=`${i}.jpg`;
  track.appendChild(img);
}

function updateSlide(){
  const width = track.children[0].offsetWidth + 12;
  track.style.transform = `translateX(-${index * width}px)`;
}

function nextSlide(){
  index = (index < total - 2) ? index + 1 : 0;
  updateSlide();
}

function prevSlide(){
  index = (index > 0) ? index - 1 : total - 2;
  updateSlide();
}

let auto = setInterval(nextSlide, 3000);

track.addEventListener("mouseenter", ()=> clearInterval(auto));
track.addEventListener("mouseleave", ()=> auto = setInterval(nextSlide, 3000));

// ---------------- FIREBASE ----------------
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBF6kER7C-IeEleZdwvC4E1KvXWytQsDWc",
  authDomain: "technical-manuel.firebaseapp.com",
  projectId: "technical-manuel",
  storageBucket: "technical-manuel.firebasestorage.app",
  messagingSenderId: "192675967998",
  appId: "1:192675967998:web:71599c243a90a42c6ac6af",
  measurementId: "G-532BB82RKX"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

import("https://www.gstatic.com/js/10.12.2/-app.js")
.then(({initializeApp})=>{
  import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")
  .then(({getFirestore,doc,getDoc,setDoc,updateDoc,increment})=>{

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const ref = doc(db,"stats","downloads");

    async function loadCount(){
      const snap = await getDoc(ref);
      if(snap.exists()){
        document.getElementById("counter").innerText =
          "Downloads: " + snap.data().count;
      }else{
        await setDoc(ref,{count:0});
      }
    }

    window.incrementDownload = async function(){
      await updateDoc(ref,{count:increment(1)});
      loadCount();
    }

    loadCount();

  });
});
</script>

</body>
</html>
